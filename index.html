<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mediglow — Tibbiy kiyim marketpleysi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --ink:#12332C;
  --ink-70:rgba(18,51,44,.7);
  --paper:#F4F6F3;
  --paper-2:#EAEEE9;
  --card:#FFFFFF;
  --fabric:#4A6B63;
  --fabric-light:#8FA89F;
  --glow:#E8A33D;
  --glow-soft:#F6D9A0;
  --clay:#C7513F;
  --muted:#6B7A75;
  --line:rgba(18,51,44,.12);
  --shadow: 0 12px 32px rgba(18,51,44,.10);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'IBM Plex Sans', sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
.serif{ font-family:'Fraunces', serif; }
.mono{ font-family:'IBM Plex Mono', monospace; letter-spacing:.02em; }
img,svg{ display:block; }
button{ font-family:inherit; cursor:pointer; border:none; background:none; }
input,select{ font-family:inherit; }
::selection{ background:var(--glow-soft); }

.app{ min-height:100vh; display:flex; flex-direction:column; }

/* ---------- HEADER ---------- */
header{
  position:sticky; top:0; z-index:40;
  background:var(--paper); border-bottom:1px solid var(--line);
  backdrop-filter:blur(6px);
}
.header-inner{
  max-width:1180px; margin:0 auto; padding:16px 24px;
  display:flex; align-items:center; gap:28px;
}
.logo{ display:flex; align-items:center; gap:10px; flex-shrink:0; }
.logo-mark{ width:34px; height:34px; position:relative; }
.logo-mark .halo{
  position:absolute; inset:-6px; border-radius:50%;
  background:radial-gradient(circle, var(--glow-soft) 0%, transparent 70%);
  opacity:.9;
}
.logo-text{ font-family:'Fraunces', serif; font-weight:600; font-size:21px; letter-spacing:-.01em; }
.logo-text b{ color:var(--glow); font-weight:600; }

nav{ display:flex; gap:4px; flex:1; }
nav button{
  padding:9px 16px; border-radius:100px; font-size:14.5px; font-weight:500;
  color:var(--muted); transition:all .18s ease;
}
nav button:hover{ color:var(--ink); background:var(--paper-2); }
nav button.active{ color:var(--ink); background:var(--card); box-shadow:var(--shadow); font-weight:600; }

.header-actions{ display:flex; align-items:center; gap:10px; }
.lang-select{
  border:1px solid var(--line); background:var(--card); border-radius:100px;
  padding:8px 12px; font-size:13px; color:var(--ink); font-weight:500;
}
.icon-btn{
  position:relative; width:40px; height:40px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:var(--card); border:1px solid var(--line); transition:.18s;
}
.icon-btn:hover{ border-color:var(--fabric-light); }
.badge{
  position:absolute; top:-4px; right:-4px; background:var(--clay); color:#fff;
  font-size:10px; font-weight:700; min-width:16px; height:16px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; padding:0 3px;
}

/* ---------- HERO / PROFESSION GRID ---------- */
.hero{ max-width:1180px; margin:0 auto; padding:56px 24px 20px; }
.eyebrow{
  display:inline-flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600;
  color:var(--fabric); text-transform:uppercase; letter-spacing:.12em; margin-bottom:16px;
}
.eyebrow::before{ content:''; width:6px; height:6px; border-radius:50%; background:var(--glow); }
.hero h1{
  font-family:'Fraunces', serif; font-weight:600; font-size:clamp(30px,3.6vw,48px);
  line-height:1.08; letter-spacing:-.01em;
}
.hero h1 em{ font-style:italic; color:var(--fabric); position:relative; }
.hero p.lead{ margin-top:16px; color:var(--muted); font-size:16px; max-width:480px; }

.hero-top{ display:grid; grid-template-columns:1.15fr 1fr; gap:52px; align-items:center; margin-bottom:40px; }
.hero-content{ min-width:0; }

.hero-cta{ display:flex; flex-wrap:wrap; gap:12px; margin-top:28px; }
.btn-primary{
  display:inline-flex; align-items:center; gap:9px; background:var(--ink); color:var(--paper);
  padding:14px 24px; border-radius:100px; font-size:14.5px; font-weight:600; transition:all .2s cubic-bezier(.2,.8,.2,1);
}
.btn-primary svg{ width:15px; height:15px; transition:transform .2s; }
.btn-primary:hover{ background:var(--fabric); transform:translateY(-1px); box-shadow:var(--shadow); }
.btn-primary:hover svg{ transform:translateX(3px); }
.btn-outline{
  display:inline-flex; align-items:center; gap:9px; background:var(--card); color:var(--ink);
  border:1px solid var(--line); padding:14px 22px; border-radius:100px; font-size:14.5px; font-weight:600; transition:all .2s;
}
.btn-outline svg{ width:15px; height:15px; color:var(--fabric); }
.btn-outline:hover{ border-color:var(--glow); background:var(--paper-2); transform:translateY(-1px); }

.hero-badges{ display:flex; flex-wrap:wrap; gap:22px; margin-top:34px; padding-top:26px; border-top:1px solid var(--line); }
.hero-badge{ display:flex; align-items:center; gap:9px; }
.hero-badge-icon{ width:32px; height:32px; border-radius:9px; background:var(--paper-2); color:var(--fabric); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.hero-badge-icon svg{ width:16px; height:16px; }
.hero-badge-text{ font-size:11.5px; color:var(--muted); line-height:1.35; display:flex; flex-direction:column; }
.hero-badge-text b{ font-family:'Fraunces',serif; font-size:15px; font-weight:600; color:var(--ink); }

.hero-visual{ position:relative; }
.photo-collage{ position:relative; width:100%; aspect-ratio:0.95/1; }
.collage-frame{
  position:absolute; border-radius:22px; box-shadow:var(--shadow); overflow:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  transition:transform .35s cubic-bezier(.2,.8,.2,1); text-align:center; padding:16px;
}
.collage-frame:hover{ transform:rotate(0deg) translateY(-4px) scale(1.01); z-index:5 !important; }
.cf-icon{ width:26%; color:var(--fabric); opacity:.5; }
.cf-icon svg{ width:100%; height:100%; }
.cf-hint{ font-size:10.5px; color:var(--muted); opacity:.75; }
.cf-caption{
  position:absolute; bottom:14px; left:14px; right:14px; background:rgba(255,255,255,.92); backdrop-filter:blur(4px);
  border-radius:100px; padding:7px 10px; font-size:11px; font-weight:600; color:var(--ink);
}
.collage-frame-a{ width:66%; aspect-ratio:4/5; top:0; left:0; background:linear-gradient(160deg,#E7F1EF 0%,#F6D9A0 160%); transform:rotate(-4deg); z-index:1; }
.collage-frame-b{ width:56%; aspect-ratio:1/1; bottom:0; right:0; background:linear-gradient(160deg,#F4EEF6 0%,#8FA89F 170%); transform:rotate(4deg); z-index:2; }
.collage-frame-b .cf-icon{ color:var(--ink); }
.hero-chip{
  position:absolute; display:flex; align-items:center; gap:7px; background:var(--card); border-radius:100px;
  padding:10px 16px; box-shadow:var(--shadow); font-size:12px; color:var(--muted); animation:chipFloat 4.5s ease-in-out infinite;
}
.hero-chip svg{ width:15px; height:15px; }
.hero-chip b{ font-family:'IBM Plex Mono',monospace; font-size:13.5px; color:var(--ink); font-weight:600; }
.hero-chip.chip-rating{ top:6%; right:-4%; }
.hero-chip.chip-rating svg{ color:var(--glow); }
.hero-chip.chip-trust{ bottom:8%; left:-6%; animation-delay:1.2s; }
.hero-chip.chip-trust svg{ color:var(--fabric); }
@keyframes chipFloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }

.profession-grid{
  display:grid; grid-template-columns:repeat(7,1fr); gap:10px;
}
.prof-card{
  background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:18px 10px 14px; text-align:center; transition:all .22s cubic-bezier(.2,.8,.2,1);
  position:relative; overflow:hidden;
}
.prof-card .glow-bg{
  position:absolute; inset:0; opacity:0; transition:opacity .25s;
  background:radial-gradient(circle at 50% 0%, var(--glow-soft) 0%, transparent 65%);
}
.prof-card:hover{ transform:translateY(-3px); box-shadow:var(--shadow); border-color:transparent; }
.prof-card.active{ border-color:var(--glow); box-shadow:0 0 0 1px var(--glow), var(--shadow); }
.prof-card.active .glow-bg{ opacity:1; }
.prof-icon{ width:30px; height:30px; margin:0 auto 10px; color:var(--fabric); position:relative; z-index:1; }
.prof-card.active .prof-icon{ color:var(--ink); }
.prof-name{ font-size:12.5px; font-weight:600; position:relative; z-index:1; line-height:1.25; }
.prof-count{ font-size:11px; color:var(--muted); margin-top:3px; position:relative; z-index:1; font-family:'IBM Plex Mono',monospace; }

/* ---------- CATALOG ---------- */
.catalog-section{ max-width:1180px; margin:0 auto; padding:44px 24px 80px; }
.catalog-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:14px;}
.catalog-head h2{ font-family:'Fraunces',serif; font-size:24px; font-weight:600; }
.catalog-count{ color:var(--muted); font-size:13.5px; white-space:nowrap; }
.search-box{ display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line); border-radius:100px; padding:9px 16px; min-width:230px; }
.search-box svg{ width:16px; height:16px; color:var(--muted); flex-shrink:0; }
.search-box input{ border:none; background:none; outline:none; font-size:13.5px; width:100%; color:var(--ink); }
.catalog-empty{ grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }
.stock-tag{ background:rgba(255,255,255,.92); backdrop-filter:blur(4px); border-radius:100px; padding:4px 9px; font-size:10.5px; font-weight:600; color:var(--fabric); white-space:nowrap; }
.stock-tag.low{ color:var(--clay); }
.media-top-right{ position:absolute; top:10px; right:10px; z-index:2; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.wish-btn{ width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,.92); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; color:var(--fabric); transition:.18s cubic-bezier(.2,.8,.2,1); flex-shrink:0; }
.wish-btn svg{ width:15px; height:15px; transition:transform .25s cubic-bezier(.34,1.56,.64,1); }
.wish-btn:hover{ transform:scale(1.1); }
.wish-btn.active{ color:var(--clay); }
.wish-btn.active svg{ fill:var(--clay); transform:scale(1.12); }
.wish-btn:active svg{ transform:scale(.85); }
.product-rating{ display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--muted); }
.product-rating .mono{ font-size:11px; color:var(--fabric); font-weight:600; }
.stars{ display:inline-flex; gap:1px; align-items:center; }
.star{ width:var(--star-size,14px); height:var(--star-size,14px); flex-shrink:0; color:var(--line); }
.star svg{ width:100%; height:100%; fill:currentColor; }
.star.filled{ color:var(--glow); }
.out-overlay{ position:absolute; inset:0; background:rgba(244,246,243,.72); display:flex; align-items:center; justify-content:center; }
.out-overlay span{ background:var(--ink); color:var(--paper); font-size:11px; font-weight:700; padding:6px 13px; border-radius:100px; letter-spacing:.02em; }
.add-btn:disabled{ opacity:.35; pointer-events:none; }
.product-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:20px; }
.product-card{
  background:var(--card); border-radius:18px; overflow:hidden; border:1px solid var(--line);
  transition:.2s; cursor:pointer; display:flex; flex-direction:column;
}
.product-card:hover{ box-shadow:var(--shadow); transform:translateY(-2px); }
.product-media{
  aspect-ratio:1/1.05; position:relative; display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.product-media svg{ width:56%; height:56%; }
.product-media .ai-tag{
  position:absolute; top:10px; left:10px; background:rgba(255,255,255,.92); backdrop-filter:blur(4px);
  border-radius:100px; padding:4px 9px; font-size:10.5px; font-weight:600; display:flex; align-items:center; gap:4px;
  color:var(--fabric);
}
.product-media .ai-tag::before{ content:'✦'; color:var(--glow); }
.product-body{ padding:14px 15px 16px; display:flex; flex-direction:column; gap:6px; flex:1; }
.product-tag{ font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:600;}
.product-name{ font-weight:600; font-size:14.5px; line-height:1.3; }
.product-bottom{ margin-top:auto; display:flex; align-items:center; justify-content:space-between; padding-top:6px; }
.product-price{ font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14.5px; }
.product-swatches{ display:flex; gap:4px; }
.swatch{ width:13px; height:13px; border-radius:50%; border:1px solid rgba(0,0,0,.08); }
.add-btn{
  width:32px; height:32px; border-radius:50%; background:var(--ink); color:var(--paper);
  display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:.18s;
}
.add-btn:hover{ background:var(--fabric); }

/* ---------- Section shared ---------- */
.section{ max-width:1180px; margin:0 auto; padding:48px 24px 90px; }
.section-head{ margin-bottom:30px; }
.section-head .eyebrow{ margin-bottom:10px; }
.section-head h2{ font-family:'Fraunces',serif; font-size:clamp(26px,3vw,36px); font-weight:600; letter-spacing:-.01em; }
.section-head p{ color:var(--muted); margin-top:10px; max-width:560px; font-size:15px; }

/* ---------- AI ASSISTANT ---------- */
.ai-layout{ display:grid; grid-template-columns:1fr 340px; gap:28px; align-items:start; }
.chat-window{
  background:var(--card); border-radius:20px; border:1px solid var(--line); box-shadow:var(--shadow);
  display:flex; flex-direction:column; height:560px; overflow:hidden;
}
.chat-head{ padding:16px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px;}
.chat-head .dot{ width:8px; height:8px; border-radius:50%; background:#4CAF6D; }
.chat-head b{ font-size:14px; }
.chat-head span{ font-size:12px; color:var(--muted); }
.chat-messages{ flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
.msg{ max-width:80%; padding:11px 15px; border-radius:16px; font-size:14px; line-height:1.5; }
.msg.bot{ background:var(--paper-2); align-self:flex-start; border-bottom-left-radius:4px; }
.msg.user{ background:var(--ink); color:var(--paper); align-self:flex-end; border-bottom-right-radius:4px; }
.msg.typing{ display:flex; gap:4px; padding:14px 16px; }
.msg.typing span{ width:6px; height:6px; border-radius:50%; background:var(--muted); animation:blink 1.2s infinite ease-in-out; }
.msg.typing span:nth-child(2){ animation-delay:.2s; } .msg.typing span:nth-child(3){ animation-delay:.4s; }
@keyframes blink{ 0%,80%,100%{ opacity:.25 } 40%{ opacity:1 } }
.chat-input-row{ padding:14px; border-top:1px solid var(--line); display:flex; gap:8px; }
.chat-input-row input{
  flex:1; border:1px solid var(--line); border-radius:100px; padding:11px 16px; font-size:14px; background:var(--paper);
}
.chat-input-row input:focus{ outline:none; border-color:var(--fabric-light); }
.send-btn{ width:42px; height:42px; border-radius:50%; background:var(--ink); color:var(--paper); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:.18s;}
.send-btn:hover{ background:var(--fabric); }
.send-btn:disabled{ opacity:.4; cursor:default; }
.quick-chip{
  border:1px solid var(--line); background:var(--card); padding:7px 13px; border-radius:100px; font-size:12.5px;
  color:var(--fabric); font-weight:500; transition:.15s;
}
.quick-chip:hover{ border-color:var(--glow); color:var(--ink); }
.quick-row{ display:flex; flex-wrap:wrap; gap:8px; padding:0 20px 16px; }

.ai-side{ display:flex; flex-direction:column; gap:14px; }
.side-card{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; }
.side-card h4{ font-size:13px; font-weight:600; margin-bottom:10px; display:flex; align-items:center; gap:6px;}
.side-card p{ font-size:13px; color:var(--muted); line-height:1.55; }
.side-card ul{ list-style:none; display:flex; flex-direction:column; gap:8px; margin-top:4px;}
.side-card li{ font-size:12.5px; color:var(--fabric); display:flex; gap:7px; align-items:flex-start; }
.side-card li::before{ content:'—'; color:var(--glow); flex-shrink:0; }

/* ---------- B2B ---------- */
.b2b-layout{ display:grid; grid-template-columns:1fr 380px; gap:32px; align-items:start; }
.b2b-form{ background:var(--card); border:1px solid var(--line); border-radius:20px; padding:30px; display:flex; flex-direction:column; gap:22px; box-shadow:var(--shadow); }
.form-row{ display:flex; flex-direction:column; gap:8px; }
.form-row label{ font-size:12.5px; font-weight:600; color:var(--ink); }
.form-row input[type=text], .form-row input[type=number], .form-row select{
  border:1px solid var(--line); border-radius:10px; padding:11px 13px; font-size:14px; background:var(--paper);
}
.form-row input:focus, .form-row select:focus{ outline:none; border-color:var(--fabric-light); }
.two-col{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.upload-box{
  border:1.5px dashed var(--line); border-radius:12px; padding:24px; text-align:center; cursor:pointer;
  transition:.18s; color:var(--muted); font-size:13px;
}
.upload-box:hover{ border-color:var(--glow); background:var(--paper-2); }
.upload-box svg{ margin:0 auto 8px; width:26px; height:26px; color:var(--fabric); }
.upload-preview{ margin-top:10px; font-size:12.5px; color:var(--fabric); font-weight:600; }
.color-picker{ display:flex; gap:10px; flex-wrap:wrap; }
.color-dot{ width:30px; height:30px; border-radius:50%; border:2px solid transparent; cursor:pointer; transition:.15s; position:relative; }
.color-dot.selected{ border-color:var(--ink); }
.color-dot.selected::after{ content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; text-shadow:0 1px 2px rgba(0,0,0,.4); }
.qty-row{ display:flex; align-items:center; gap:14px; }
.qty-row input[type=range]{ flex:1; accent-color:var(--glow); }
.qty-value{ font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:16px; min-width:48px; text-align:right; }
.toggle-row{ display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:var(--paper-2); border-radius:12px; }
.toggle-row span{ font-size:13.5px; font-weight:500; }
.switch{ width:40px; height:22px; border-radius:100px; background:var(--line); position:relative; transition:.2s; flex-shrink:0; }
.switch.on{ background:var(--fabric); }
.switch::after{ content:''; position:absolute; width:16px; height:16px; border-radius:50%; background:#fff; top:3px; left:3px; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
.switch.on::after{ left:21px; }

.price-card{
  background:var(--ink); color:var(--paper); border-radius:20px; padding:28px; position:sticky; top:100px;
}
.price-card .label{ font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--fabric-light); font-weight:600; }
.price-card .total{ font-family:'Fraunces',serif; font-size:36px; font-weight:600; margin:10px 0 20px; }
.price-line{ display:flex; justify-content:space-between; font-size:13px; padding:9px 0; border-bottom:1px solid rgba(244,246,243,.12); color:rgba(244,246,243,.75); }
.price-line b{ color:var(--paper); font-weight:600; }
.discount-tag{ display:inline-block; background:var(--glow); color:var(--ink); font-size:11px; font-weight:700; padding:3px 9px; border-radius:100px; margin-top:14px; }
.submit-btn{
  width:100%; background:var(--glow); color:var(--ink); font-weight:700; padding:14px; border-radius:12px;
  margin-top:22px; font-size:14.5px; transition:.18s;
}
.submit-btn:hover{ background:var(--glow-soft); }

/* ---------- DASHBOARD ---------- */
.dash-toggle{ display:inline-flex; background:var(--paper-2); padding:4px; border-radius:100px; margin-bottom:26px; }
.dash-toggle button{ padding:9px 20px; border-radius:100px; font-size:13.5px; font-weight:600; color:var(--muted); }
.dash-toggle button.active{ background:var(--card); color:var(--ink); box-shadow:var(--shadow); }
.stat-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.stat-card{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px; }
.stat-card .stat-label{ font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em;}
.stat-card .stat-value{ font-family:'Fraunces',serif; font-size:28px; font-weight:600; margin-top:8px; }
.stat-card .stat-delta{ font-size:12px; color:#4CAF6D; margin-top:6px; font-weight:600; }
.stat-card .stat-delta.down{ color:var(--clay); }

.dash-grid{ display:grid; grid-template-columns:1.3fr 1fr; gap:20px; }
.panel{ background:var(--card); border:1px solid var(--line); border-radius:18px; padding:22px; }
.panel h3{ font-size:15px; font-weight:600; margin-bottom:18px; }
.bar-chart{ display:flex; align-items:flex-end; gap:10px; height:180px; }
.bar-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
.bar{ width:100%; background:linear-gradient(180deg, var(--glow-soft), var(--fabric)); border-radius:6px 6px 2px 2px; transition:height .6s cubic-bezier(.2,.8,.2,1); }
.bar-col span{ font-size:11px; color:var(--muted); font-family:'IBM Plex Mono',monospace; }
.order-row{ display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--line); font-size:13px; }
.order-row:last-child{ border-bottom:none; }
.order-id{ font-family:'IBM Plex Mono',monospace; color:var(--muted); font-size:12px; }
.status-pill{ font-size:11px; font-weight:600; padding:4px 10px; border-radius:100px; }
.status-pill.tayyor{ background:#E6F4EA; color:#2E7D46; }
.status-pill.jarayon{ background:var(--glow-soft); color:#8A5A00; }
.status-pill.yubor{ background:#E4EEFB; color:#2A5C9A; }
.top-model-row{ display:flex; align-items:center; gap:12px; padding:10px 0; }
.top-model-row .rank{ font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--muted); width:18px;}
.top-model-row .bar-mini{ flex:1; height:6px; background:var(--paper-2); border-radius:4px; overflow:hidden; }
.top-model-row .bar-mini i{ display:block; height:100%; background:var(--fabric); border-radius:4px; }

/* Mijoz view */
.loyalty-card{ background:linear-gradient(135deg, var(--ink), var(--fabric)); color:var(--paper); border-radius:20px; padding:26px; margin-bottom:24px; display:flex; justify-content:space-between; align-items:center; }
.loyalty-card .pts{ font-family:'Fraunces',serif; font-size:34px; font-weight:600; }
.loyalty-card .pts span{ font-size:14px; font-weight:400; color:var(--fabric-light); }
.track-steps{ display:flex; justify-content:space-between; position:relative; margin:26px 0 8px; }
.track-steps::before{ content:''; position:absolute; top:14px; left:5%; right:5%; height:2px; background:var(--line); }
.track-step{ display:flex; flex-direction:column; align-items:center; gap:8px; position:relative; z-index:1; flex:1; }
.track-step .dot{ width:28px; height:28px; border-radius:50%; background:var(--card); border:2px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--muted); }
.track-step.done .dot{ background:var(--fabric); border-color:var(--fabric); color:#fff; }
.track-step.current .dot{ background:var(--glow); border-color:var(--glow); color:var(--ink); box-shadow:0 0 0 5px var(--glow-soft); }
.track-step span.label{ font-size:11.5px; font-weight:600; text-align:center; color:var(--muted); }
.track-step.done span.label, .track-step.current span.label{ color:var(--ink); }

/* ---------- CART DRAWER ---------- */
.overlay{ position:fixed; inset:0; background:rgba(18,51,44,.4); backdrop-filter:blur(2px); z-index:60; opacity:0; pointer-events:none; transition:.25s; }
.overlay.show{ opacity:1; pointer-events:all; }
.drawer{
  position:fixed; top:0; right:0; height:100%; width:400px; max-width:92vw; background:var(--paper);
  z-index:61; transform:translateX(100%); transition:transform .3s cubic-bezier(.2,.8,.2,1); display:flex; flex-direction:column;
  box-shadow:-10px 0 40px rgba(0,0,0,.15);
}
.drawer.show{ transform:translateX(0); }
.drawer-head{ padding:22px 22px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--line);}
.drawer-head h3{ font-family:'Fraunces',serif; font-size:20px; font-weight:600; }
.close-btn{ width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--card); border:1px solid var(--line);}
.cart-items{ flex:1; overflow-y:auto; padding:16px 22px; display:flex; flex-direction:column; gap:14px; }
.cart-item{ display:flex; gap:12px; background:var(--card); border-radius:14px; padding:12px; border:1px solid var(--line); }
.cart-item-media{ width:56px; height:56px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.cart-item-media svg{ width:60%; height:60%; }
.cart-item-info{ flex:1; min-width:0; }
.cart-item-info .name{ font-size:13.5px; font-weight:600; }
.cart-item-info .meta{ font-size:11.5px; color:var(--muted); margin-top:2px; }
.cart-item-bottom{ display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
.cart-item-info .price{ font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; }
.cart-qty-stepper{ display:flex; align-items:center; gap:10px; background:var(--paper); border:1px solid var(--line); border-radius:100px; padding:4px 10px; }
.cart-qty-stepper button{ width:18px; height:18px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:600; color:var(--ink); line-height:1; }
.cart-qty-stepper span{ font-size:12.5px; font-weight:600; min-width:14px; text-align:center; }
.cart-remove{ align-self:flex-start; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--muted); flex-shrink:0; transition:.15s; }
.cart-remove svg{ width:13px; height:13px; }
.cart-remove:hover{ color:var(--clay); background:var(--paper-2); }
.cart-empty{ text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }
.drawer-footer{ padding:20px 22px 24px; border-top:1px solid var(--line); }
.drawer-footer .subtotal-row{ display:flex; justify-content:space-between; font-size:15px; margin-bottom:16px; }
.drawer-footer .subtotal-row b{ font-family:'IBM Plex Mono',monospace; font-size:17px; }
.pay-methods{ display:flex; gap:8px; margin-bottom:14px; }
.pay-methods div{ flex:1; text-align:center; padding:9px 6px; border:1px solid var(--line); border-radius:10px; font-size:11px; font-weight:600; color:var(--muted); background:var(--card); }
.checkout-btn{ width:100%; background:var(--ink); color:var(--paper); padding:14px; border-radius:12px; font-weight:700; font-size:14.5px; }
.checkout-btn:hover{ background:var(--fabric); }
.checkout-btn:disabled{ opacity:.4; pointer-events:none; }

/* ---------- PRODUCT MODAL ---------- */
.modal-wrap{ position:fixed; inset:0; z-index:70; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:.2s; padding:20px;}
.modal-wrap.show{ opacity:1; pointer-events:all; }
.modal{ background:var(--card); border-radius:22px; max-width:760px; width:100%; max-height:88vh; overflow-y:auto; display:grid; grid-template-columns:1fr 1fr; }
.modal-media{ background:var(--paper-2); display:flex; align-items:center; justify-content:center; padding:40px; position:relative; }
.modal-media svg{ width:60%; height:60%; }
.modal-body{ padding:32px 30px; }
.modal-body .tag{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--fabric); font-weight:700; }
.modal-body h2{ font-family:'Fraunces',serif; font-size:24px; margin:8px 0 10px; }
.modal-body .price{ font-family:'IBM Plex Mono',monospace; font-size:20px; font-weight:600; margin-bottom:18px; }
.opt-label{ font-size:12.5px; font-weight:600; margin:16px 0 8px; }
.size-row{ display:flex; gap:8px; flex-wrap:wrap; }
.size-btn{ width:40px; height:38px; border:1px solid var(--line); border-radius:10px; font-size:12.5px; font-weight:600; }
.size-btn.selected{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
.modal-qty-stepper{ display:flex; align-items:center; gap:14px; }
.modal-qty-stepper button{ width:34px; height:34px; border:1px solid var(--line); border-radius:10px; font-size:17px; font-weight:600; display:flex; align-items:center; justify-content:center; transition:.15s; }
.modal-qty-stepper button:hover{ border-color:var(--fabric-light); }
.modal-qty-stepper span.mono{ font-size:15px; font-weight:600; min-width:20px; text-align:center; }
.modal-qty-max{ font-size:11.5px; color:var(--muted); margin-left:auto; }
.modal-close{ position:absolute; top:16px; right:16px; width:34px; height:34px; border-radius:50%; background:var(--card); display:flex; align-items:center; justify-content:center; border:1px solid var(--line); z-index:2;}
.modal-add{ width:100%; margin-top:24px; background:var(--ink); color:var(--paper); padding:14px; border-radius:12px; font-weight:700; }
.modal-add:hover{ background:var(--fabric); }

/* toast */
.toast{ position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--paper); padding:13px 22px; border-radius:100px; font-size:13.5px; font-weight:500; z-index:90; opacity:0; transition:.25s; display:flex; align-items:center; gap:8px;}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
.toast::before{ content:'✦'; color:var(--glow); }

/* ---------- PRODUCT MANAGEMENT ---------- */
.mgmt-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.mgmt-add-btn{ background:var(--ink); color:var(--paper); padding:10px 18px; border-radius:100px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:7px; transition:.18s; }
.mgmt-add-btn:hover{ background:var(--fabric); }
.mgmt-add-btn svg{ width:15px; height:15px; }
.mgmt-table{ background:var(--card); border:1px solid var(--line); border-radius:16px; overflow-x:auto; }
.mgmt-row{ display:grid; grid-template-columns:44px 1.5fr .9fr .85fr .8fr .8fr 80px; align-items:center; gap:12px; padding:12px 18px; border-bottom:1px solid var(--line); font-size:13px; min-width:620px; }
.mgmt-row:last-child{ border-bottom:none; }
.mgmt-row.head{ background:var(--paper-2); font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:600; padding:11px 18px; }
.mgmt-thumb{ width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; }
.mgmt-thumb svg{ width:60%; height:60%; }
.mgmt-name{ font-weight:600; }
.mgmt-ai{ font-size:10.5px; color:var(--fabric); font-weight:600; }
.mgmt-swatches{ display:flex; gap:3px; }
.mgmt-actions{ display:flex; gap:6px; justify-content:flex-end; }
.icon-sm-btn{ width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:var(--card); display:flex; align-items:center; justify-content:center; color:var(--muted); transition:.15s; }
.icon-sm-btn svg{ width:14px; height:14px; }
.icon-sm-btn:hover{ border-color:var(--fabric-light); color:var(--ink); }
.icon-sm-btn.danger:hover{ border-color:var(--clay); color:var(--clay); }
.mgmt-empty{ padding:50px 20px; text-align:center; color:var(--muted); font-size:13.5px; }

.product-media img, .cart-item-media img, .mgmt-thumb img, .modal-media img{ width:100%; height:100%; object-fit:cover; }
.pf-image-preview{ display:flex; align-items:center; gap:10px; margin-top:10px; }
.pf-image-preview img{ width:64px; height:64px; border-radius:12px; object-fit:cover; border:1px solid var(--line); }
.pf-remove-img{ font-size:12px; color:var(--clay); text-decoration:underline; }

.admin-modal-body{ padding:30px; max-width:460px; }
.admin-modal-body h2{ font-family:'Fraunces',serif; font-size:21px; margin-bottom:20px; }
.admin-modal-body h2 svg{ width:20px; height:20px; vertical-align:-4px; margin-right:3px; }
.checkbox-colors{ display:flex; gap:9px; flex-wrap:wrap; }
.checkbox-colors .color-dot{ width:28px; height:28px; }

/* ---------- WISHLIST DRAWER EXTRAS ---------- */
.wish-view-btn{ font-size:11.5px; font-weight:600; color:var(--fabric); text-decoration:underline; }
.wish-view-btn:hover{ color:var(--ink); }

/* ---------- DELIVERY ESTIMATE ---------- */
.delivery-row{ display:flex; align-items:center; gap:9px; font-size:12.5px; color:var(--fabric); font-weight:500; margin-top:10px; padding:10px 12px; background:var(--paper-2); border-radius:10px; }
.delivery-row svg{ width:17px; height:17px; flex-shrink:0; color:var(--fabric); }
.delivery-row b{ color:var(--ink); font-weight:600; }
.delivery-row.mini{ margin:0 22px 14px; }

/* ---------- SIZE GUIDE ---------- */
.size-guide-link{ display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; color:var(--fabric); margin-left:10px; text-decoration:underline; text-underline-offset:2px; }
.size-guide-link:hover{ color:var(--ink); }
.size-guide-link svg{ width:13px; height:13px; }
.sg-inputs{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
.sg-calc-btn{ width:100%; background:var(--ink); color:var(--paper); padding:13px; border-radius:12px; font-weight:700; font-size:14px; transition:.18s; }
.sg-calc-btn:hover{ background:var(--fabric); }
.sg-result{ margin-top:20px; padding:20px; border-radius:14px; background:var(--paper-2); text-align:center; opacity:0; transform:translateY(6px); transition:all .3s cubic-bezier(.2,.8,.2,1); }
.sg-result.show{ opacity:1; transform:translateY(0); }
.sg-result .sg-size{ font-family:'Fraunces',serif; font-size:38px; font-weight:700; color:var(--ink); line-height:1; margin:6px 0; }
.sg-result .sg-size span{ display:inline-flex; align-items:center; justify-content:center; width:64px; height:64px; border-radius:50%; background:var(--card); box-shadow:0 0 0 3px var(--glow); }
.sg-result p{ font-size:12.5px; color:var(--muted); margin-top:6px; }
.sg-select-btn{ margin-top:14px; background:var(--glow); color:var(--ink); font-weight:700; padding:11px 20px; border-radius:100px; font-size:13px; transition:.18s; }
.sg-select-btn:hover{ background:var(--glow-soft); }
.sg-table{ margin-top:22px; font-size:11.5px; color:var(--muted); line-height:1.7; border-top:1px solid var(--line); padding-top:14px; }

/* ---------- REVIEWS ---------- */
.reviews-section{ margin-top:28px; border-top:1px solid var(--line); padding-top:22px; }
.reviews-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
.reviews-head h3{ font-family:'Fraunces',serif; font-size:16px; font-weight:600; }
.reviews-avg{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--muted); }
.reviews-avg b{ color:var(--ink); font-size:13.5px; }
.review-list{ display:flex; flex-direction:column; gap:14px; }
.review-item{ background:var(--paper-2); border-radius:14px; padding:14px 16px; animation:fadeInUp .35s ease both; }
.review-top{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.review-avatar{ width:30px; height:30px; border-radius:50%; background:var(--fabric); color:var(--paper); display:flex; align-items:center; justify-content:center; font-size:12.5px; font-weight:700; flex-shrink:0; font-family:'Fraunces',serif; }
.review-name{ font-size:12.5px; font-weight:600; }
.review-date{ font-size:11px; color:var(--muted); margin-left:auto; white-space:nowrap; }
.review-comment{ font-size:12.5px; color:var(--ink-70); line-height:1.55; }
@keyframes fadeInUp{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:translateY(0);} }

/* ---------- RELATED / RECENTLY VIEWED ---------- */
.related-section{ margin-top:28px; border-top:1px solid var(--line); padding-top:22px; }
.related-section h3{ font-family:'Fraunces',serif; font-size:16px; font-weight:600; margin-bottom:14px; }
.mini-card-row{ display:flex; gap:12px; overflow-x:auto; padding-bottom:6px; scroll-behavior:smooth; }
.mini-card{ flex-shrink:0; width:118px; cursor:pointer; transition:transform .2s; }
.mini-card:hover{ transform:translateY(-3px); }
.mini-card-media{ width:118px; height:118px; border-radius:12px; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:7px; }
.mini-card-media svg{ width:52%; height:52%; }
.mini-card-media img{ width:100%; height:100%; object-fit:cover; }
.mini-card-name{ font-size:11.5px; font-weight:600; line-height:1.3; margin-bottom:2px; }
.mini-card-price{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:600; color:var(--fabric); }

.recent-viewed-section{ max-width:1180px; margin:0 auto; padding:0 24px 8px; }
.recent-viewed-section .rv-head{ display:flex; align-items:center; gap:8px; margin-bottom:16px; }
.recent-viewed-section .rv-head svg{ width:16px; height:16px; color:var(--fabric); }
.recent-viewed-section .rv-head h2{ font-family:'Fraunces',serif; font-size:19px; font-weight:600; }
.recent-viewed-section .mini-card{ width:150px; }
.recent-viewed-section .mini-card-media{ width:150px; height:150px; }

/* ---------- COUPON ---------- */
.coupon-block{ padding:0 22px 14px; }
.coupon-block .opt-label svg{ width:14px; height:14px; color:var(--fabric); }
.coupon-row{ display:flex; gap:8px; }
.coupon-row input{ flex:1; border:1px solid var(--line); border-radius:10px; padding:10px 13px; font-size:13px; background:var(--card); text-transform:uppercase; }
.coupon-row input:focus{ outline:none; border-color:var(--fabric-light); }
.coupon-apply-btn{ background:var(--ink); color:var(--paper); padding:10px 16px; border-radius:10px; font-size:12.5px; font-weight:600; white-space:nowrap; transition:.18s; }
.coupon-apply-btn:hover{ background:var(--fabric); }
.coupon-hint{ font-size:11px; color:var(--muted); margin-top:6px; }
.coupon-applied{ display:flex; align-items:center; justify-content:space-between; background:var(--paper-2); border:1px dashed var(--fabric-light); border-radius:10px; padding:10px 13px; font-size:12.5px; }
.coupon-applied b{ color:var(--fabric); font-weight:700; }
.coupon-remove{ font-size:11px; color:var(--clay); text-decoration:underline; }
.discount-row{ display:flex; justify-content:space-between; font-size:13px; color:var(--fabric); margin-bottom:6px; }

footer{ border-top:1px solid var(--line); padding:26px 24px; text-align:center; color:var(--muted); font-size:12.5px; }

/* ---------- HAMBURGER + MOBILE NAV DRAWER ---------- */
.hamburger-btn{ display:none; width:40px; height:40px; border-radius:12px; align-items:center; justify-content:center; background:var(--card); border:1px solid var(--line); flex-shrink:0; transition:.15s; }
.hamburger-btn svg{ width:19px; height:19px; }
.hamburger-btn:hover{ border-color:var(--fabric-light); }
.drawer-left{ left:0; right:auto; transform:translateX(-100%); box-shadow:10px 0 40px rgba(0,0,0,.15); }
.drawer-left.show{ transform:translateX(0); }
.mnav-list{ padding:10px 0; overflow-y:auto; flex:1; }
.mnav-item{ display:flex; align-items:center; gap:14px; width:100%; padding:14px 22px; font-size:14.5px; font-weight:500; color:var(--ink); transition:.15s; text-align:left; }
.mnav-item:hover{ background:var(--paper-2); }
.mnav-item.active{ background:var(--paper-2); color:var(--ink); font-weight:600; }
.mnav-item svg{ width:19px; height:19px; color:var(--fabric); flex-shrink:0; }
.mnav-item.active svg{ color:var(--glow); }
.mnav-item span{ flex:1; }
.mnav-divider{ height:1px; background:var(--line); margin:8px 22px; }

/* ---------- BOTTOM NAVIGATION (mobile only) ---------- */
.bottom-nav{ display:none; }
@media (max-width:980px){
  .hamburger-btn{ display:flex; }
  body{ padding-bottom:76px; }
  .bottom-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; z-index:45;
    background:var(--card); border-top:1px solid var(--line);
    padding:7px 4px calc(7px + env(safe-area-inset-bottom));
    box-shadow:0 -8px 24px rgba(18,51,44,.08);
  }
}
.bn-item{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; color:var(--muted); position:relative; transition:.2s; }
.bn-item svg{ width:21px; height:21px; transition:transform .2s cubic-bezier(.34,1.56,.64,1); }
.bn-item span{ font-size:10px; font-weight:600; }
.bn-item.active{ color:var(--ink); }
.bn-item.active svg{ transform:translateY(-2px); color:var(--glow); }
.bn-item.active::before{ content:''; position:absolute; top:-7px; left:50%; transform:translateX(-50%); width:18px; height:3px; border-radius:3px; background:var(--glow); }
.bn-badge{ position:absolute; top:0; right:calc(50% - 15px); background:var(--clay); color:#fff; font-size:9px; font-weight:700; min-width:14px; height:14px; border-radius:50%; display:flex; align-items:center; justify-content:center; padding:0 3px; }

/* ---------- CONTACT PAGE ---------- */
.contact-layout{ display:grid; grid-template-columns:1.3fr 1fr; gap:28px; align-items:start; margin-bottom:26px; }
.form-row textarea{ border:1px solid var(--line); border-radius:10px; padding:11px 13px; font-size:14px; background:var(--paper); resize:vertical; font-family:inherit; }
.form-row textarea:focus{ outline:none; border-color:var(--fabric-light); }
.side-card h4 svg{ width:16px; height:16px; color:var(--fabric); flex-shrink:0; }
.social-row{ display:flex; gap:10px; flex-wrap:wrap; }
.social-row a{ width:38px; height:38px; border-radius:50%; background:var(--card); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--fabric); transition:.18s; }
.social-row a svg{ width:16px; height:16px; }
.social-row a:hover{ border-color:var(--glow); color:var(--ink); transform:translateY(-2px); }
.map-placeholder{
  border-radius:18px; border:1.5px dashed var(--line); background:var(--paper-2); aspect-ratio:16/6; min-height:180px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--muted);
}
.map-placeholder svg{ width:26px; height:26px; color:var(--fabric); }
.map-placeholder span{ font-size:13px; font-weight:500; }

/* ---------- FAQ ACCORDION ---------- */
.faq-list{ display:flex; flex-direction:column; gap:12px; max-width:760px; }
.faq-item{ background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden; }
.faq-q{ width:100%; display:flex; align-items:center; justify-content:space-between; gap:14px; padding:18px 20px; font-size:14.5px; font-weight:600; text-align:left; }
.faq-toggle{ width:24px; height:24px; border-radius:50%; background:var(--paper-2); display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--fabric); flex-shrink:0; transition:.25s; }
.faq-item.open .faq-toggle{ transform:rotate(45deg); background:var(--glow-soft); color:var(--ink); }
.faq-a{ max-height:0; overflow:hidden; transition:max-height .3s ease, padding .3s ease; padding:0 20px; font-size:13.5px; color:var(--muted); line-height:1.6; }
.faq-item.open .faq-a{ max-height:200px; padding:0 20px 18px; }

@media (max-width:980px){
  .profession-grid{ grid-template-columns:repeat(4,1fr); }
  .ai-layout, .b2b-layout, .dash-grid, .contact-layout{ grid-template-columns:1fr; }
  .stat-grid{ grid-template-columns:repeat(2,1fr); }
  nav{ display:none; }
  .modal{ grid-template-columns:1fr; }
  .hero-top{ grid-template-columns:1fr; gap:36px; }
  .hero-visual{ order:-1; max-width:360px; margin:0 auto; width:100%; }
  .hero-chip.chip-rating{ right:0; }
  .hero-chip.chip-trust{ left:0; }
  .hero p.lead{ max-width:100%; }
}
@media (max-width:560px){
  .profession-grid{ grid-template-columns:repeat(3,1fr); }
  .stat-grid{ grid-template-columns:1fr 1fr; }
  .two-col{ grid-template-columns:1fr; }
  .sg-inputs{ grid-template-columns:1fr; }
  .mini-card, .recent-viewed-section .mini-card{ width:104px; }
  .mini-card-media, .recent-viewed-section .mini-card-media{ width:104px; height:104px; }
  .hero-cta{ flex-direction:column; }
  .btn-primary, .btn-outline{ width:100%; justify-content:center; }
  .hero-badges{ gap:16px 20px; }
  .hero-chip{ padding:8px 12px; font-size:11px; }
  .hero-chip b{ font-size:12px; }
  .header-inner{ gap:8px; padding:13px 14px; }
  .logo-mark{ width:28px; height:28px; }
  .logo-text{ font-size:17px; }
  .lang-select{ padding:7px 6px; font-size:11px; max-width:58px; }
  .header-actions{ gap:6px; }
  .icon-btn{ width:34px; height:34px; }
  .hamburger-btn{ width:36px; height:36px; }
}

/* ============ REVIEWS (dummy, deterministic per product) ============ */
const REVIEW_NAMES = ["Dilnoza","Sardor","Malika","Javlon","Nodira","Aziz","Kamola","Bekzod","Shahnoza","Ulug'bek","Zarina","Farrux","Madina","Otabek"];
const REVIEW_POS = [
  "Sifati juda yaxshi, mato nafas oladi va issiq qilmaydi.",
  "O'lchami aynan mos keldi, albatta tavsiya qilaman.",
  "Tikuvi puxta, bir necha oy kiysam ham shaklini yo'qotmadi.",
  "Narxiga nisbatan sifati ajoyib, yana buyurtma beraman.",
  "Ish joyida kiyishga juda qulay, cho'ntaklari ham baquvvat.",
  "Rangi rasmda ko'rsatilganidek chiqdi, juda mamnunman.",
];
const REVIEW_MID = [
  "Yaxshi, lekin yetkazib berish biroz kechikdi.",
  "Sifati o'rtacha, kutganimdan biroz farq qildi.",
  "Yaxshi forma, lekin o'lchami biroz katta keldi, o'lcham jadvaliga qarab tanlang.",
];
let REVIEWS_CACHE = {};
function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function getReviews(productId){
  if(REVIEWS_CACHE[productId]) return REVIEWS_CACHE[productId];
  const rand = mulberry32(productId*97 + 13);
  const count = 3 + Math.floor(rand()*4);
  const reviews = [];
  for(let i=0;i<count;i++){
    const r = rand();
    const rating = r<0.65 ? 5 : r<0.9 ? 4 : 3;
    const name = REVIEW_NAMES[Math.floor(rand()*REVIEW_NAMES.length)];
    const pool = rating>=4 ? REVIEW_POS : REVIEW_MID;
    const comment = pool[Math.floor(rand()*pool.length)];
    const daysAgo = 2 + Math.floor(rand()*70);
    reviews.push({name, rating, comment, daysAgo});
  }
  reviews.sort((a,b)=>a.daysAgo-b.daysAgo);
  REVIEWS_CACHE[productId] = reviews;
  return reviews;
}
function avgRating(productId){
  const reviews = getReviews(productId);
  return Math.round((reviews.reduce((a,r)=>a+r.rating,0)/reviews.length)*10)/10;
}
function renderStars(rating, size){
  size = size || 14;
  let html = `<span class="stars" style="--star-size:${size}px">`;
  for(let i=1;i<=5;i++){
    html += `<span class="star ${i<=Math.round(rating)?'filled':''}">${ICONS.star}</span>`;
  }
  html += `</span>`;
  return html;
}

function recommendSize(h, w){
  const table = [
    {size:'XS', hMax:162, wMax:54},
    {size:'S',  hMax:170, wMax:66},
    {size:'M',  hMax:178, wMax:80},
    {size:'L',  hMax:186, wMax:96},
    {size:'XL', hMax:194, wMax:112},
    {size:'XXL',hMax:999, wMax:999},
  ];
  let hi = table.findIndex(x=>h<=x.hMax); if(hi<0) hi = table.length-1;
  let wi = table.findIndex(x=>w<=x.wMax); if(wi<0) wi = table.length-1;
  return table[Math.max(hi,wi)].size;
}

async function sendChat(text){
  if(!text || !text.trim()) return;
  const box = document.getElementById('chatMessages');
  chatHistory.push({role:'user', content:text});
  box.insertAdjacentHTML('beforeend', `<div class="msg user">${escapeHtml(text)}</div>`);
  box.scrollTop = box.scrollHeight;
  document.getElementById('chatInput').value='';
  const typingId = 'typing-'+Date.now();
  box.insertAdjacentHTML('beforeend', `<div class="msg bot typing" id="${typingId}"><span></span><span></span><span></span></div>`);
  box.scrollTop = box.scrollHeight;

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 350,
        system: "Sen Mediglow platformasining tibbiy kiyim (forma) bo'yicha AI yordamchisisan. Foydalanuvchining bo'yi, vazni va kasbi asosida o'lcham (XS/S/M/L/XL/XXL), qulay model va mos mato haqida QISQA, aniq, do'stona tavsiya ber (3-5 gap). Faqat o'zbek tilida javob ber. Emoji ishlatsang bo'ladi, lekin oz.",
        messages: [...chatHistory]
      })
    });
    const data = await response.json();
    const reply = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n') || "Kechirasiz, javob topilmadi. Qayta urinib ko'ring.";
    chatHistory.push({role:'assistant', content:reply});
    document.getElementById(typingId)?.remove();
    box.insertAdjacentHTML('beforeend', `<div class="msg bot">${escapeHtml(reply).replace(/\n/g,'<br>')}</div>`);
  }catch(e){
    document.getElementById(typingId)?.remove();
    box.insertAdjacentHTML('beforeend', `<div class="msg bot">Kechirasiz, hozir javob berolmadim. Internetni tekshirib qayta yozing.</div>`);
  }
  box.scrollTop = box.scrollHeight;
}
function escapeHtml(s){ const d=document.createElement('div'); d.innerText=s; return d.innerHTML; }

let editingProductId = null;
let formColors = [];
let formSizes = [];
let pfImageData = null;

function openProductForm(id){

  const p = id ? PRODUCTS.find(x=>x.id===id) : null;
  formColors = p ? [...p.colors] : ['white'];
  formSizes = p ? [...p.sizes] : ['S','M','L'];

      <div class="admin-modal-body">
        <button class="modal-close" id="adminModalClose">${ICONS.close}</button>
        <h2>${p ? "Mahsulotni tahrirlash" : "Yangi mahsulot qo'shish"}</h2>
        <div class="form-row" style="margin-bottom:14px;">
          <label>Mahsulot nomi</label>
          <input type="text" id="pfName" value="${p ? p.name.replace(/"/g,'&quot;') : ''}" placeholder="Masalan: Klassik hamshira formasi">
        </div>
        <div class="two-col" style="margin-bottom:14px;">
          <div class="form-row">
            <label>Yo'nalish</label>
            <select id="pfProf">
              ${PROFESSIONS.map(pr=>`<option value="${pr.id}" ${p && p.prof===pr.id ? 'selected':''}>${pr.name}</option>`).join('')}
            </select>
          </div>
          <div class="form-row">
            <label>Narxi (so'm)</label>

          </div>
        </div>
        <div class="form-row" style="margin-bottom:14px;">
          <label>Omborda mavjud miqdor (dona)</label>
          <input type="number" id="pfStock" min="0" value="${p ? p.stock : 20}" placeholder="20">

          <label>Mahsulot rasmi</label>
          <div class="upload-box" id="pfUploadBox">
            ${ICONS.upload}
            <div>Rasm tanlash uchun bosing (JPG, PNG, 4MB gacha)</div>
            <div class="upload-preview" id="pfUploadPreview">${pfImageData ? "✓ Rasm yuklangan" : ''}</div>
          </div>

            ${pfImageData ? `<img src="${pfImageData}"><button type="button" class="pf-remove-img" id="pfRemoveImage">Olib tashlash</button>` : ''}
          </div>
          <div style="font-size:11.5px;color:var(--muted);margin-top:6px;">Rasm yuklamasangiz, yo'nalish uchun standart belgi ishlatiladi.</div>
        </div>
        <div class="form-row" style="margin-bottom:14px;">
          <label>O'lchamlar (bir nechtasini tanlang)</label>
          <div class="size-row" id="pfSizes">
            ${SIZES.map(s=>`<button type="button" class="size-btn ${formSizes.includes(s)?'selected':''}" data-pfsize="${s}">${s}</button>`).join('')}
          </div>
        </div>
        <div class="form-row" style="margin-bottom:14px;">
          <label>Ranglar (bir nechtasini tanlang)</label>
          <div class="color-picker checkbox-colors" id="pfColors">
            ${Object.entries(COLORS).map(([k,v])=>`<div class="color-dot ${formColors.includes(k)?'selected':''}" data-pfcolor="${k}" style="background:${v}"></div>`).join('')}
          </div>
        </div>
        <div class="toggle-row" style="margin-bottom:20px;">
          <span>AI tavsiya belgisini ko'rsatish</span>
          <div class="switch ${p && p.ai ? 'on':''}" id="pfAiSwitch" data-on="${p && p.ai ? '1':'0'}"></div>
        </div>
        <button class="modal-add" id="pfSave">${p ? "Saqlash" : "Qo'shish"}</button>
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('show');
  wrap.classList.add('show');
  bindAdminFormEvents();
}
function closeProductForm(){
  document.getElementById('adminModal').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}
function bindAdminFormEvents(){
  document.getElementById('adminModalClose').onclick = closeProductForm;
  document.querySelectorAll('#pfColors .color-dot').forEach(d=>{
    d.onclick = ()=>{
      const c = d.dataset.pfcolor;
      if(formColors.includes(c)){ formColors = formColors.filter(x=>x!==c); d.classList.remove('selected'); }
      else{ formColors.push(c); d.classList.add('selected'); }
    };
  });
  document.querySelectorAll('#pfSizes .size-btn').forEach(b=>{
    b.onclick = ()=>{
      const s = b.dataset.pfsize;
      if(formSizes.includes(s)){ formSizes = formSizes.filter(x=>x!==s); b.classList.remove('selected'); }
      else{ formSizes.push(s); b.classList.add('selected'); }
    };
  });
  const aiSwitch = document.getElementById('pfAiSwitch');
  aiSwitch.onclick = ()=>{
    const on = aiSwitch.dataset.on==='1';
    aiSwitch.dataset.on = on ? '0' : '1';
    aiSwitch.classList.toggle('on');
  };
  document.getElementById('pfUploadBox').onclick = ()=> document.getElementById('pfImageFile').click();
  document.getElementById('pfImageFile').onchange = (e)=>{
    const f = e.target.files[0];
    if(!f) return;
    if(!f.type.startsWith('image/')){ showToast("Faqat rasm fayli tanlang"); return; }
    if(f.size > 4*1024*1024){ showToast("Rasm hajmi 4MB dan oshmasin"); return; }
    const reader = new FileReader();
    reader.onload = ()=>{
      pfImageData = reader.result;
      document.getElementById('pfImagePreviewWrap').innerHTML = `<img src="${pfImageData}"><button type="button" class="pf-remove-img" id="pfRemoveImage">Olib tashlash</button>`;
      document.getElementById('pfUploadPreview').textContent = "✓ " + f.name;
      bindRemoveImageBtn();
    };
    reader.readAsDataURL(f);
  };
  bindRemoveImageBtn();
  document.getElementById('pfSave').onclick = saveProductForm;
}
function bindRemoveImageBtn(){
  document.getElementById('pfRemoveImage')?.addEventListener('click', ()=>{
    pfImageData = null;
    document.getElementById('pfImagePreviewWrap').innerHTML = '';
    document.getElementById('pfUploadPreview').textContent = '';
    document.getElementById('pfImageFile').value = '';
  });
}
function saveProductForm(){
  const name = document.getElementById('pfName').value.trim();
  const prof = document.getElementById('pfProf').value;
  const price = parseInt(document.getElementById('pfPrice').value);
  const stockRaw = document.getElementById('pfStock').value;
  const stock = stockRaw==='' ? 0 : parseInt(stockRaw);
  const ai = document.getElementById('pfAiSwitch').dataset.on==='1';

  if(!name){ showToast("Mahsulot nomini kiriting"); return; }
  if(!price || price<=0){ showToast("To'g'ri narx kiriting"); return; }
  if(isNaN(stock) || stock<0){ showToast("To'g'ri qoldiq miqdorini kiriting"); return; }
  if(formSizes.length===0){ showToast("Kamida bitta o'lcham tanlang"); return; }
  if(formColors.length===0){ showToast("Kamida bitta rang tanlang"); return; }

  if(editingProductId){
    const p = PRODUCTS.find(x=>x.id===editingProductId);
    p.name = name; p.prof = prof; p.price = price; p.stock = stock; p.colors = [...formColors]; p.sizes = [...formSizes]; p.ai = ai; p.icon = prof; p.image = pfImageData;
    showToast("Mahsulot yangilandi");
  }else{
    const newId = PRODUCTS.length ? Math.max(...PRODUCTS.map(x=>x.id))+1 : 1;
    PRODUCTS.push({id:newId, prof, name, price, stock, icon:prof, colors:[...formColors], sizes:[...formSizes], ai, image:pfImageData});
    showToast("Yangi mahsulot qo'shildi");
  }
  closeProductForm();
  render();
}
function deleteProduct(id){
  const p = PRODUCTS.find(x=>x.id===id);
  if(!p) return;
  if(!confirm(`"${p.name}" mahsulotini o'chirmoqchimisiz?`)) return;
  PRODUCTS = PRODUCTS.filter(x=>x.id!==id);
  render();
  showToast("Mahsulot o'chirildi");
}

        </div>`).join('')
      }

    ${state.cart.length>0 ? `
    <div class="coupon-block">
      <div class="opt-label" style="display:flex;align-items:center;gap:6px;margin:0 0 8px;">${ICONS.tag} Promokod</div>
      ${state.appliedCoupon ? `
        <div class="coupon-applied">
          <span>Qo'llanildi: <b>${state.appliedCoupon.code}</b> (−${state.appliedCoupon.percent}%)</span>
          <button class="coupon-remove" id="couponRemove">Bekor qilish</button>

        </div>
        <div class="coupon-hint">Sinab ko'ring: MEDIGLOW10, WELCOME15, YANGI20</div>
      `}
    </div>` : ''}
    <div class="drawer-footer">
      ${discount>0 ? `
        <div class="discount-row"><span>Oraliq summa</span><span class="mono">${money(subtotal)}</span></div>
        <div class="discount-row"><span>Chegirma (−${state.appliedCoupon.percent}%)</span><span class="mono">−${money(discount)}</span></div>
      ` : ''}
      <div class="subtotal-row"><span>Jami</span><b class="mono">${money(total)}</b></div>
      <div class="pay-methods"><div>Click</div><div>Payme</div><div>Uzum</div></div>
      <button class="checkout-btn" id="checkoutBtn" ${state.cart.length===0?'disabled':''}>Buyurtmani rasmiylashtirish</button>

function bindCartEvents(){
  document.getElementById('closeDrawer').onclick = closeDrawer;
  document.querySelectorAll('[data-cartinc]').forEach(b=>{
    b.onclick = ()=>{
      const i=parseInt(b.dataset.cartinc);
      const item = state.cart[i];
      const prod = PRODUCTS.find(x=>x.id===item.id);
      if(prod && item.qty >= prod.stock){ showToast("Omborda shuncha bor: "+prod.stock+" dona"); return; }
      item.qty++; renderHeaderCartBadge(); renderCart();
    };
  });
  document.querySelectorAll('[data-cartdec]').forEach(b=>{
    b.onclick = ()=>{ const i=parseInt(b.dataset.cartdec); state.cart[i].qty--; if(state.cart[i].qty<=0){ state.cart.splice(i,1); } renderHeaderCartBadge(); renderCart(); };
  });
  document.querySelectorAll('[data-cartremove]').forEach(b=>{
    b.onclick = ()=>{ const i=parseInt(b.dataset.cartremove); state.cart.splice(i,1); renderHeaderCartBadge(); renderCart(); };
  });
  const couponApply = document.getElementById('couponApply');
  if(couponApply){
    couponApply.onclick = ()=>{
      const code = document.getElementById('couponInput').value.trim().toUpperCase();
      if(!code){ showToast("Promokodni kiriting"); return; }
      if(COUPONS[code]){ state.appliedCoupon = {code, percent:COUPONS[code]}; showToast(`Promokod qo'llanildi: −${COUPONS[code]}%`); renderCart(); }
      else{ showToast("Bunday promokod topilmadi"); }
    };
  }
  document.getElementById('couponRemove')?.addEventListener('click', ()=>{ state.appliedCoupon = null; renderCart(); });
  document.getElementById('checkoutBtn').onclick = ()=>{
    if(state.cart.length===0){ showToast("Savat bo'sh"); return; }
    state.cart = [];
    state.appliedCoupon = null;
    closeDrawer();
    state.page='dash'; state.dashView='mijoz';
    render();
    showToast("Buyurtma qabul qilindi! Kuzatib boring.");
  };
}
function renderHeaderCartBadge(){

function renderBottomNav(){

function bindBottomNavEvents(){
  document.querySelectorAll('[data-bn]').forEach(btn=>{

      const key = btn.dataset.bn;
      if(key==='home'){ state.page='home'; render(); window.scrollTo({top:0,behavior:'smooth'}); }

          document.getElementById('catalogSection')?.scrollIntoView({behavior:'smooth', block:'start'});

function closeModal(){

  document.getElementById('overlay').classList.remove('show');
}
function bindModalEvents(){
  document.getElementById('modalClose').onclick = closeModal;
  document.querySelectorAll('#sizeRow .size-btn').forEach(b=>{
    b.onclick = ()=>{ modalSize=b.dataset.size; document.querySelectorAll('#sizeRow .size-btn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); };
  });
  document.querySelectorAll('#modalColors .color-dot').forEach(d=>{
    d.onclick = ()=>{ modalColor=d.dataset.mcolor; document.querySelectorAll('#modalColors .color-dot').forEach(x=>x.classList.remove('selected')); d.classList.add('selected'); };
  });
  const qtyInc = document.getElementById('modalQtyInc');
  const qtyDec = document.getElementById('modalQtyDec');
  if(qtyInc){
    qtyInc.onclick = ()=>{ if(modalQty < currentModalProduct.stock){ modalQty++; document.getElementById('modalQtyValue').textContent = modalQty; } else{ showToast("Omborda shuncha bor: "+currentModalProduct.stock+" dona"); } };
    qtyDec.onclick = ()=>{ if(modalQty > 1){ modalQty--; document.getElementById('modalQtyValue').textContent = modalQty; } };
  }
  document.getElementById('modalAdd').onclick = ()=>{
    addToCart(currentModalProduct, modalSize, modalColor, modalQty);
    closeModal();
  };
  const modalWish = document.querySelector('#productModal [data-wish]');
  if(modalWish){
    modalWish.onclick = ()=>{ toggleWishlist(currentModalProduct.id); modalWish.classList.toggle('active', state.wishlist.includes(currentModalProduct.id)); };
  }
  const sgLink = document.getElementById('sizeGuideOpen');
  if(sgLink){ sgLink.onclick = ()=> openSizeGuide(); }
  document.querySelectorAll('#productModal [data-openproduct]').forEach(el=>{
    el.onclick = ()=> openModal(parseInt(el.dataset.openproduct));
  });
}

function bindSizeGuideEvents(){
  document.getElementById('sgClose').onclick = closeSizeGuide;
  document.getElementById('sgCalc').onclick = ()=>{
    const h = parseFloat(document.getElementById('sgHeight').value);
    const w = parseFloat(document.getElementById('sgWeight').value);
    if(!h || !w || h<100 || h>230 || w<30 || w>200){ showToast("Bo'y va vazningizni to'g'ri kiriting"); return; }
    const size = recommendSize(h, w);
    document.getElementById('sgSizeValue').textContent = size;
    const p = currentModalProduct;
    const noteEl = document.getElementById('sgResultNote');
    const selectBtn = document.getElementById('sgSelectBtn');
    if(p && p.sizes.includes(size)){
      noteEl.textContent = `Bu mahsulotda "${size}" o'lchami mavjud.`;
      selectBtn.style.display = 'inline-flex';
      selectBtn.dataset.size = size;
    }else if(p){
      noteEl.textContent = `Bu mahsulotda "${size}" mavjud emas. Mavjud o'lchamlar: ${p.sizes.join(', ')}.`;
      selectBtn.style.display = 'none';
    }else{
      noteEl.textContent = "Katalogdan mos mahsulotni tanlaganingizda shu o'lchamni ko'rsatib qo'yamiz.";
      selectBtn.style.display = 'none';
    }
    document.getElementById('sgResult').classList.add('show');
  };
  document.getElementById('sgSelectBtn').onclick = (e)=>{
    const size = e.currentTarget.dataset.size;
    if(!size || !currentModalProduct) return;
    modalSize = size;
    document.querySelectorAll('#sizeRow .size-btn').forEach(x=>{ x.classList.toggle('selected', x.dataset.size===size); });
    closeSizeGuide();
    showToast(`O'lcham tanlandi: ${size}`);
  };

    document.getElementById('overlay').classList.remove('show');
  }
}

function addToCart(p, size, color, qty){
  const existing = state.cart.find(c=>c.id===p.id && c.size===size && c.color===color);
  if(existing){
    existing.qty = Math.min(existing.qty + qty, p.stock || existing.qty + qty);
  }else{
    state.cart.push({id:p.id, name:p.name, price:p.price, prof:p.prof, icon:p.icon, image:p.image||null, size, color, qty});
  }
  render();
  showToast(t().addToCart);
  openDrawer();
}

function openDrawer(){ document.getElementById('cartDrawer').classList.add('show'); document.getElementById('overlay').classList.add('show'); renderBottomNav(); }
function closeDrawer(){ document.getElementById('cartDrawer').classList.remove('show'); document.getElementById('overlay').classList.remove('show'); renderBottomNav(); }

let toastTimer;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2200);
}

      const item = document.getElementById('faqItem'+btn.dataset.faq);
      const wasOpen = item.classList.contains('open');
      document.querySelectorAll('.faq-item.open').forEach(x=> x.classList.remove('open'));
      if(!wasOpen) item.classList.add('open');
    };
  });

  // Product management
  document.getElementById('addProductBtn')?.addEventListener('click', ()=> openProductForm(null));
  document.querySelectorAll('[data-editprod]').forEach(b=>{
    b.onclick = ()=> openProductForm(parseInt(b.dataset.editprod));
  });
  document.querySelectorAll('[data-delprod]').forEach(b=>{
    b.onclick = ()=> deleteProduct(parseInt(b.dataset.delprod));
  });

  // cart drawer / overlay
  document.getElementById('overlay').onclick = ()=>{ closeDrawer(); closeModal(); closeProductForm(); closeWishlistDrawer(); closeSizeGuide(); closeMobileNav(); };
}

render();
</script>
</body>
</html>
